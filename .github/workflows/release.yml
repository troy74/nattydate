name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            artifact: nattydate
          - target: x86_64-apple-darwin
            runner: macos-13         # last Intel runner
            use_cross: false
            artifact: nattydate

          # ── Linux x86-64 (static musl) ───────────────────────────────────
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            artifact: nattydate

          # ── Raspberry Pi — 64-bit (aarch64) ─────────────────────────────
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            artifact: nattydate

          # ── Raspberry Pi — 32-bit (armv7) ───────────────────────────────
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use_cross: true
            artifact: nattydate

          # ── Windows x86-64 ───────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            artifact: nattydate.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (Linux ARM targets)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cd staging
          tar -czf nattydate-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nattydate-${{ matrix.target }}
          path: staging/nattydate-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
